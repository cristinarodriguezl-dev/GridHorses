<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de caballos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="grid">

    <div class="text">Caballos</div>
    <img class="img1" src="media/alotoflittlehorses.jpg" alt="Imagen de un dibujo de muchos potros en una pradera">
    <img class="img2" src="media/drawhorses.png" alt="Imagen generada por ia que simula ser el dibujo de un niño, de varios caballos de diferentes colores posando con uno saltando un obstáculo de 2 barras, con el título 'mis caballos' y firmado por Andrés de 10 años">
